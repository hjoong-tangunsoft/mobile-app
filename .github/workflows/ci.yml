name: Mobile App CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build
        run: npm run build

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Tests
        run: npm test

  lint:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Lint
        run: npm run lint

  notify-youtrack:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Extract issue ID
        id: extract
        run: |
          MSG="${{ github.event.head_commit.message }}"
          ISSUE_ID=$(echo "$MSG" | grep -oP 'MOB-\d+' | head -1)
          echo "issue_id=$ISSUE_ID" >> "$GITHUB_OUTPUT"
          echo "Found issue: $ISSUE_ID"

      - name: Post CI result to YouTrack
        if: steps.extract.outputs.issue_id != ''
        run: |
          ISSUE_ID="${{ steps.extract.outputs.issue_id }}"
          SHA="${{ github.sha }}"
          SHORT="${SHA:0:7}"
          RUN="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          COMMIT="${{ github.event.head_commit.url }}"

          COMMENT="## ✅ CI/CD Pipeline 통과\n\n| 항목 | 내용 |\n|------|------|\n| **Commit** | [\`${SHORT}\`](${COMMIT}) |\n| **Pipeline** | [Run #${{ github.run_number }}](${RUN}) |\n| **Build** | ✅ Pass |\n| **Test** | ✅ Pass |\n| **Lint** | ✅ Pass |\n\n> 🤖 GitHub Actions CI/CD 파이프라인 결과입니다."

          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.YOUTRACK_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://tangunsoft.youtrack.cloud/api/issues/${ISSUE_ID}/comments" \
            -d "{\"text\": \"${COMMENT}\"}"

          echo ""
          echo "Posted to YouTrack: ${ISSUE_ID}"
